name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, mbstring, sockets, pcntl, posix
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate composer
        run: composer validate --strict

      - name: Audit dependencies
        run: composer audit

      - name: Run unit tests
        run: composer test

  integration:
    name: Integration
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, mbstring, sockets, pcntl, posix
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run integration tests
        env:
          RABBIT_HOST: 127.0.0.1
          RABBIT_PORT: 5672
          RABBIT_USER: guest
          RABBIT_PASSWORD: guest
          RABBIT_VHOST: /
          RABBITMQ_REQUIRED: '1'
        run: vendor/bin/phpunit -c phpunit.integration.xml
